<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Mafia – Settings</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="overlay">
  <div id="popup">
    <h2>Game Settings</h2>

    <label for="playerCount">Player Count (4–10)</label>
    <input type="number" id="playerCount" min="4" max="10" value="7">

    <h3>Player Names</h3>
    <p class="hint">Names are randomly generated. You can edit them.</p>
    <div id="nameList"></div>

    <button id="startGame">Start Game</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
