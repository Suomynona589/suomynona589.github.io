<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Live-Learning JS Chatbot</title>
  <style>
    * { box-sizing: border-box; font-family: system-ui, sans-serif; }
    body {
      margin: 0;
      background: #020617;
      color: #e5e7eb;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .chat {
      width: 100%;
      max-width: 700px;
      height: 80vh;
      background: #020617;
      border-radius: 16px;
      border: 1px solid #1f2937;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .header {
      padding: 12px 16px;
      border-bottom: 1px solid #1f2937;
      background: #030712;
      font-size: 14px;
    }
    .header span {
      display: block;
      font-size: 11px;
      color: #9ca3af;
      margin-top: 2px;
    }
    .log {
      flex: 1;
      padding: 12px;
      overflow-y: auto;
      font-size: 14px;
    }
    .msg {
      margin-bottom: 8px;
    }
    .msg.you { text-align: right; }
    .msg .who {
      font-size: 11px;
      color: #9ca3af;
    }
    .msg .text {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 10px;
      margin-top: 2px;
      max-width: 80%;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .msg.you .text {
      background: #4f46e5;
      color: #f9fafb;
      border-bottom-right-radius: 3px;
    }
    .msg.bot .text {
      background: #020617;
      border: 1px solid #1f2937;
      border-bottom-left-radius: 3px;
    }
    .input {
      display: flex;
      padding: 10px;
      border-top: 1px solid #1f2937;
      background: #020617;
      gap: 8px;
    }
    .input input {
      flex: 1;
      padding: 8px 10px;
      border-radius: 999px;
      border: 1px solid #374151;
      background: #020617;
      color: #e5e7eb;
      outline: none;
      font-size: 14px;
    }
    .input button {
      padding: 0 16px;
      border-radius: 999px;
      border: none;
      background: #4f46e5;
      color: #f9fafb;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    .typing {
      font-size: 11px;
      color: #9ca3af;
      padding: 0 12px 6px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="chat">
    <div class="header">
      Live-Learning JS Chatbot
      <span>No APIs. No preset replies. It learns only from this chat.</span>
    </div>
    <div id="log" class="log"></div>
    <div id="typing" class="typing">bot is thinking...</div>
    <div class="input">
      <input id="input" type="text" placeholder="Say something..." autocomplete="off" />
      <button id="send">Send</button>
    </div>
  </div>

  <script>
    const logEl = document.getElementById('log');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('send');
    const typingEl = document.getElementById('typing');

    // Character-level Markov model: order-3
    const ORDER = 3;
    const model = {}; // key: context string, value: { nextChar: count }

    function addMsg(who, text) {
      const div = document.createElement('div');
      div.className = 'msg ' + (who === 'you' ? 'you' : 'bot');
      const whoEl = document.createElement('div');
      whoEl.className = 'who';
      whoEl.textContent = who;
      const textEl = document.createElement('div');
      textEl.className = 'text';
      textEl.textContent = text;
      div.appendChild(whoEl);
      div.appendChild(textEl);
      logEl.appendChild(div);
      logEl.scrollTop = logEl.scrollHeight;
    }

    function trainOnText(text) {
      const s = '\n' + text + '\n'; // start/end markers
      for (let i = 0; i < s.length - ORDER; i++) {
        const ctx = s.slice(i, i + ORDER);
        const next = s[i + ORDER];
        if (!model[ctx]) model[ctx] = {};
        model[ctx][next] = (model[ctx][next] || 0) + 1;
      }
    }

    function sampleNextChar(ctx) {
      const options = model[ctx];
      if (!options) return null;
      let total = 0;
      for (const k in options) total += options[k];
      let r = Math.random() * total;
      for (const k in options) {
        r -= options[k];
        if (r <= 0) return k;
      }
      return null;
    }

    function generateReply(maxLen = 200) {
      // pick a random starting context from model
      const keys = Object.keys(model);
      if (keys.length === 0) {
        // no training yet: fallback
        return "I don't know anything yet. Keep talking so I can learn your style.";
      }
      let ctx = keys[Math.floor(Math.random() * keys.length)];
      let out = ctx;
      for (let i = 0; i < maxLen; i++) {
        const next = sampleNextChar(ctx);
        if (!next) break;
        out += next;
        ctx = out.slice(out.length - ORDER, out.length);
        if (next === '\n') break;
      }
      // clean start/end markers
      out = out.replace(/\n/g, '').trim();
      if (!out) {
        return "My brain glitched. Say more things so I have material.";
      }
      return out;
    }

    function handleSend() {
      const text = inputEl.value.trim();
      if (!text) return;
      inputEl.value = '';
      addMsg('you', text);

      // train on user message
      trainOnText(text);

      typingEl.style.display = 'block';
      const replyDelay = 300 + Math.min(1500, text.length * 40);

      setTimeout(() => {
        const reply = generateReply();
        // train on bot's own reply too, so it compounds its style
        trainOnText(reply);
        typingEl.style.display = 'none';
        addMsg('bot', reply);
      }, replyDelay);
    }

    sendBtn.addEventListener('click', handleSend);
    inputEl.addEventListener('keydown', e => {
      if (e.key === 'Enter') handleSend();
    });

    // Initial message (also trains the model)
    const intro = "You just booted me up. I only learn from what we say here.";
    addMsg('bot', intro);
    trainOnText(intro);
  </script>
</body>
</html>
