<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>A1Z26 Cipher</title>
  <link rel="icon" href="/images/bill.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <h1 class="title">A1Z26 Cipher</h1>

  <div class="container">
    <div class="box">
      <div class="header" id="leftHeader">Normal Text</div>
      <textarea id="leftBox">ABC</textarea>
    </div>

    <button id="swapBtn" class="swap-btn">←<br>→</button>

    <div class="box">
      <div class="header" id="rightHeader">Ciphered</div>
      <textarea id="rightBox" readonly>1-2-3</textarea>
    </div>
  </div>

  <button id="calcBtn" class="calc-btn">Calculate</button>

  <div class="note">
    ⚠️ Anything NOT in the english alphabet (such as numbers, special characters, etc) will not be translated. If you want to include numbers just spell them out.
  </div>

  <a class="github-link" href="https://github.com/Suomynona589/suomynona589.github.io" target="_blank">GitHub Source Code</a>

  <script src="script.js"></script>
</body>
</html>
