<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Suomynona DSL Compiler</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header class="top-bar">
      <div class="title">Suomynona DSL Compiler</div>
    </header>
    <main class="main-area">
      <textarea id="editor" spellcheck="false" placeholder="Write your DSL script here"></textarea>
      <div id="terminal" class="terminal"></div>
      <button id="translateBtn" class="translate-btn">Compile</button>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@xenova/transformers/dist/transformers.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
