<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Suomynona DSL Compiler (Ollama)</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header class="top-bar">
      <div class="title">Suomynona DSL Compiler (Ollama)</div>
    </header>
    <main class="main-area">
      <div class="controls">
        <label for="modelInput">Model</label>
        <input id="modelInput" type="text" value="llama3" autocomplete="off">
        <label for="hostInput">Ollama Host</label>
        <input id="hostInput" type="text" value="http://localhost:11434" autocomplete="off">
        <button id="translateBtn" class="translate-btn">Compile</button>
      </div>
      <textarea id="editor" spellcheck="false" placeholder="Write your DSL script here"></textarea>
      <div id="terminal" class="terminal"></div>
    </main>
  </div>
  <script src="script.js"></script>
</body>
</html>
