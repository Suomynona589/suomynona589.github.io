<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Discord Bot Translator</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header class="top-bar">
      <div class="title">Discord Bot Translator</div>
      <div class="token-area">
        <label for="tokenInput">Token</label>
        <input id="tokenInput" type="password" autocomplete="off">
      </div>
    </header>
    <main class="main-area">
      <textarea id="editor" spellcheck="false" placeholder="Write your main.bot script here"></textarea>
      <div id="terminal" class="terminal"></div>
      <button id="translateBtn" class="translate-btn">Translate</button>
    </main>
  </div>
  <script src="script.js"></script>
</body>
</html>
