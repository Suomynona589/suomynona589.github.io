<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Rubiks Cube Solver Thing</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <h1>Rubiks Cube Solver Thing</h1>

    <div id="palette">
      <button class="color-btn" data-color="U" style="background:#ffff00;">U</button>
      <button class="color-btn" data-color="D" style="background:#ffffff; color:#000;">D</button>
      <button class="color-btn" data-color="F" style="background:#00aa00;">F</button>
      <button class="color-btn" data-color="B" style="background:#0000ff;">B</button>
      <button class="color-btn" data-color="R" style="background:#ff0000;">R</button>
      <button class="color-btn" data-color="L" style="background:#ff8800;">L</button>
    </div>

    <div id="cube-wrapper">
      <div id="cube-container"></div>
    </div>

    <div id="state-panel">
      <textarea id="state-output" readonly></textarea>
      <button id="copy-state">Copy</button>
    </div>

    <div id="solver-panel">
      <button id="solve-btn">Solve</button>
      <pre id="solver-result"></pre>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
